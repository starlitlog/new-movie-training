# Llama 3 8B Base - Persona Training Configuration
# Model: meta-llama/Meta-Llama-3-8B (base model, no instruct tuning)
# Optimized for RTX 8000 48GB VRAM

model_name: meta-llama/Meta-Llama-3-8B
dataset_path: ./data
dataset_pattern: "*.jsonl"
tokenized_path: data/tokenized
use_tokenized: true
data_format: prompt_completion

# Data source configuration
data_source:
  type: local

cuda_visible_devices: "0"
output_dir: outputs/llama3_8b

# Training hyperparameters
# Higher epochs for persona learning with limited data
epochs: 6
batch_size: 4
lr: 2e-4
gradient_accumulation_steps: 2  # Effective batch size = 8
max_length: 512

# Learning rate schedule
warmup_ratio: 0.05
weight_decay: 0.01
lr_scheduler_type: cosine

# Precision (RTX 8000 uses FP16)
bf16: false
fp16: true

# LoRA configuration
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Logging and checkpointing
save_steps: 50
logging_steps: 10
logging_strategy: "steps"
evaluation_strategy: "steps"
eval_steps: 50
save_total_limit: 3

# Memory optimization
gradient_checkpointing: false

# DataLoader optimization
dataloader_num_workers: 8
dataloader_prefetch_factor: 4
