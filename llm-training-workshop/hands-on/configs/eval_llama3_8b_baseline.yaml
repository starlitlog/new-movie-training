# Baseline eval for Llama 3 8B (non-fine-tuned)
model_path: meta-llama/Meta-Llama-3-8B
model_subfolder:
dataset_path: ./data/eval
dataset_pattern: "*.jsonl"
data_format: prompt_completion
metrics_dir: artifacts/metrics/llama3_8b_baseline
max_samples: 100
max_new_tokens: 256
temperature: 0.7
top_p: 0.9
do_sample: true
cuda_visible_devices: "0"
use_gguf: false
