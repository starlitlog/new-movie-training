# Baseline eval for Llama 3.2 3B Instruct (non-fine-tuned)
model_path: meta-llama/Llama-3.2-3B-Instruct
model_subfolder:
dataset_path: ./data/eval
dataset_pattern: "*.jsonl"
data_format: prompt_completion
metrics_dir: artifacts/metrics/llama32_3b_instruct_baseline
max_samples: 100
max_new_tokens: 256
temperature: 0.7
top_p: 0.9
do_sample: true
cuda_visible_devices: "0"
use_gguf: false
