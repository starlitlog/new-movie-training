# Baseline eval for Mistral 7B (non-fine-tuned)
model_path: mistralai/Mistral-7B-v0.3
model_subfolder:
dataset_path: ./data/eval
dataset_pattern: "*.jsonl"
data_format: prompt_completion
metrics_dir: artifacts/metrics/mistral_7b_baseline
max_samples: 100
max_new_tokens: 256
temperature: 0.7
top_p: 0.9
do_sample: true
cuda_visible_devices: "0"
use_gguf: false
